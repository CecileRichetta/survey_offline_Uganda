{{ block scripts }}
<!doctype html>
<html lang="en">
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        .progress-text {
            text-align: right;
            color: grey;
            font-size: 11px;
            width: 100%; /* Ensures the text spans the full width of its container */
        }
        .btn-primary {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
        .text-center {
            text-align: center;
        }
    </style>
{{ endblock }}

{{ block title }}
        <p class="progress-text" >
            Questionnaire progress: 12/11
        </p>
{{ endblock }}

{{ block content }}
    <p>
        {{ include C.TEMPLATE_DEBRIEF_FORM }}
    </p>

    <p class="text-center">
        <button class="btn btn-primary">
            NEXT
        </button>
    </p>
{{ endblock }}

{{ block options }}
</html>
{{ endblock }}
