{{ block scripts }}
    <html lang="en">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
{{ endblock }}

{{ block style }}
    <style>
        .progress-text {
            text-align: right;
            color: grey;
            font-size: 11px;
            width: 100%; /* Ensures the text spans the full width of its container */
        }
        .btn-primary {
            background-color: #0d6efd;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .btn-primary:hover {
            background-color: #0b5ed7;
        }
        .text-center {
            text-align: center;
        }
        .venn-diagram {
            display: block;
            margin: 0 auto 20px;
            padding: 10px;
            max-width: 100%;
        }
    </style>
{{ endblock }}

{{ block title }}
        <p class="progress-text" >
            Questionnaire progress: 9/11
        </p>
{{ endblock }}

{{ block content }}
    <h3 class="mb-4 text-center text-primary">
        <b>Relations with others</b>
    </h3>

    <h5>
         {{ formfield 'venn_diagram' }}
        <img src="{{ static C.VENN_LUO }}" class="venn-diagram" alt="Venn diagram">
         {{ formfield 'hope_check' }}
    </h5>
    <p class="text-center">
        <button class="btn btn-primary">
            NEXT
        </button>
    </p>
{{ endblock }}

{{ block options }}
    </html>
{{ endblock }}
